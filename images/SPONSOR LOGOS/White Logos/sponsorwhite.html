<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
  margin: 0;
  overflow: hidden;
  background: transparent;
}

.wrapper {
  width: 100%;
  height: 120px;
  display: flex;
  align-items: center;
  overflow: hidden;
}

.ticker {
  display: flex;
  align-items: center;
  width: max-content;
  animation: scroll 35s linear infinite;
}

.ticker img {
  height: 80px;
  margin-right: 100px;
  object-fit: contain;
}

/* smooth infinite scroll */
@keyframes scroll {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="ticker">

    <!-- ORIGINAL SET -->
    <img src="Altium.png">
    <img src="Anderson Anodizing.png">
    <img src="Aramark.png">
    <img src="Gitlab.png">
    <img src="ISS Horizontal White.png">
    <img src="Marl Technologies.png">
    <img src="Negmax.png">
    <img src="Teledyne Mems.png">
    <img src="UofA.png">

    <!-- DUPLICATE FOR LOOP -->
    <img src="Altium.png">
    <img src="Anderson Anodizing.png">
    <img src="Aramark.png">
    <img src="Gitlab.png">
    <img src="ISS Horizontal White.png">
    <img src="Marl Technologies.png">
    <img src="Negmax.png">
    <img src="Teledyne Mems.png">
    <img src="UofA.png">

  </div>
</div>

</body>
</html>
